name: Job Outputs Demo

on:
  push:

jobs:
  date_job:
    runs-on: self-hosted
    outputs:
      today: ${{ steps.set_date.outputs.today }}
    steps:
      - name: Set date
        id: set_date
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  print_job:
    runs-on: self-hosted
    needs: date_job
    steps:
      - name: Print date
        run: echo "Today is ${{ needs.date_job.outputs.today }}"