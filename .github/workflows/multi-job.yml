name: Multi Job Pipeline

on:
  push:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Build step
        run: echo "Building the app"

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Test step
        run: echo "Running tests"

  deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Deploy step
        run: echo "Deploying"