name: Download Artifact Demo

on:
  workflow_dispatch:

jobs:
  create-report:
    runs-on: ubuntu-latest

    steps:
      - name: Create Report
        run: |
          mkdir reports
          echo "GitHub Actions Artifact Demo" > reports/report.txt

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: report-file
          path: reports/report.txt

  read-report:
    needs: create-report
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: report-file

      - name: Display File
        run: |
          cat report.txt
